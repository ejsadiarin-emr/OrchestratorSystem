trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '8.0.x'
  nodeVersion: '20.x'

steps:
  - task: UseDotNet@2
    inputs:
      version: $(dotnetVersion)
      includePreviewVersions: false

  - task: NodeTool@0
    inputs:
      versionSpec: $(nodeVersion)

  - script: dotnet restore
    displayName: 'Restore .NET dependencies'

  - script: dotnet build --no-restore --configuration $(buildConfiguration)
    displayName: 'Build .NET solution'

  - script: |
      cd orchestrator/web
      npm ci
      npm run build
    displayName: 'Build React frontend'

  - script: |
      dotnet publish orchestrator/backend/Orchestrator.csproj -c $(buildConfiguration) -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true
    displayName: 'Publish Orchestrator'

  - script: |
      dotnet publish agent/backend/Agent.csproj -c $(buildConfiguration) -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=true
    displayName: 'Publish Agent'

  - powershell: |
      New-Item -ItemType Directory -Force -Path dist | Out-Null
      New-Item -ItemType Directory -Force -Path dist/artifacts | Out-Null
      New-Item -ItemType Directory -Force -Path dist/workload-definitions | Out-Null
      Copy-Item orchestrator/backend/bin/Release/net8.0-windows/win-x64/publish/Orchestrator.exe dist/
      Copy-Item agent/backend/bin/Release/net8.0-windows/win-x64/publish/Agent.exe dist/
      Copy-Item orchestrator/backend/appsettings.json dist/
    displayName: 'Create distribution'

  - task: PublishBuildArtifacts@1
    inputs:
      pathToPublish: 'dist'
      artifactName: 'deployment-poc'
    displayName: 'Publish build artifacts'
